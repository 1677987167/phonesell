<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="手机售卖">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.svg">
<title>手机售卖管理系统</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  background: #f5f6fa; color: #333; min-height: 100vh; padding-bottom: 0;
}
/* ===== 头部 ===== */
.header {
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);
  color: #fff; padding: 16px 20px; text-align: center;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 4px 20px rgba(0,0,0,.15);
}
.header h1 { font-size: 22px; letter-spacing: 1px; }
.header p { font-size: 12px; opacity: .65; margin-top: 2px; }
.header-user {
  position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
  display: flex; align-items: center; gap: 6px;
}
.header-user span { font-size: 12px; opacity: .85; display: none; }
.header-user button {
  padding: 6px 12px; border: 1px solid rgba(255,255,255,.3);
  background: rgba(255,255,255,.1); color: #fff; border-radius: 8px;
  cursor: pointer; font-size: 12px; backdrop-filter: blur(4px);
}
.header-user button:active { background: rgba(255,255,255,.25); }

/* ===== 认证 ===== */
.auth-page { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; padding: 20px; }
.auth-page#loginPage, .auth-page#registerPage { background: linear-gradient(135deg, #1a1a2e, #0f3460); }
.alert-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.55);
  z-index: 3000; justify-content: center; align-items: center;
}
.alert-overlay.show { display: flex; }
.alert-box {
  background: #fff; border-radius: 16px; padding: 28px 24px 20px;
  width: 300px; max-width: 90%; text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,.3); animation: fadeUp .3s ease;
}
.alert-box p { font-size: 15px; color: #333; margin-bottom: 20px; line-height: 1.5; }
.alert-box button {
  padding: 10px 36px; border: none; border-radius: 10px; font-size: 15px;
  font-weight: 700; cursor: pointer; background: #0f3460; color: #fff;
  transition: all .2s;
}
.alert-box button:active { transform: scale(.95); }
.main-app { display: none; }
.auth-box {
  background: rgba(255,255,255,.95); border-radius: 20px;
  box-shadow: 0 20px 60px rgba(0,0,0,.3); padding: 32px 28px;
  width: 360px; max-width: 100%;
  animation: fadeUp .4s ease;
}
@keyframes fadeUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.auth-box h2 { text-align: center; margin-bottom: 24px; color: #1a1a2e; font-size: 24px; font-weight: 700; }
.auth-box .form-group { margin-bottom: 14px; }
.auth-box .form-group label { display: block; font-size: 13px; color: #888; margin-bottom: 4px; font-weight: 600; }
.auth-box .form-group input {
  width: 100%; padding: 12px 16px; border: 2px solid #e8e8e8;
  border-radius: 12px; font-size: 15px; outline: none; transition: all .2s;
  background: #fafafa;
}
.auth-box .form-group input:focus { border-color: #0f3460; background: #fff; box-shadow: 0 0 0 4px rgba(15,52,96,.1); }
.auth-box .btn {
  width: 100%; padding: 14px; border: none; border-radius: 12px;
  font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 8px;
  transition: all .2s;
}
.auth-box .btn-primary { background: linear-gradient(135deg, #0f3460, #1a4a7a); color: #fff; }
.auth-box .btn-primary:active { transform: scale(.97); }
.auth-box .auth-link { text-align: center; margin-top: 16px; font-size: 14px; color: #999; }
.auth-box .auth-link a { color: #0f3460; cursor: pointer; text-decoration: none; font-weight: 600; }
.auth-box .error { color: #e53935; font-size: 13px; text-align: center; margin-bottom: 10px; display: none; }

/* ===== 容器 ===== */
.container { max-width: 1200px; margin: 0 auto; padding: 12px; }

/* ===== 统计卡片 ===== */
.stats {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
  margin-bottom: 12px;
}
.stat-card {
  background: #fff; padding: 12px 10px; border-radius: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,.06); text-align: center;
  transition: transform .2s;
}
.stat-card:active { transform: scale(.96); }
.stat-card .num { font-size: 20px; font-weight: 800; color: #0f3460; line-height: 1.2; }
.stat-card .label { font-size: 11px; color: #999; margin-top: 2px; }

/* ===== 品牌导航 ===== */
.brand-nav {
  display: flex; gap: 6px; overflow-x: auto; padding: 4px 0 8px;
  scrollbar-width: none; -webkit-overflow-scrolling: touch;
  margin-bottom: 8px;
}
.brand-nav::-webkit-scrollbar { display: none; }
.brand-tab {
  flex-shrink: 0; padding: 8px 18px; border: none;
  background: #fff; border-radius: 20px; font-size: 13px;
  font-weight: 600; cursor: pointer; color: #666;
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
  transition: all .2s;
}
.brand-tab:active { transform: scale(.95); }
.brand-tab.active {
  background: #0f3460; color: #fff;
  box-shadow: 0 4px 12px rgba(15,52,96,.3);
}

/* ===== 工具栏 ===== */
.toolbar {
  display: flex; align-items: center; gap: 8px; margin-bottom: 12px;
}
.search-input {
  flex: 1; padding: 10px 14px; border: 2px solid #eee;
  border-radius: 10px; font-size: 14px; outline: none;
  transition: all .2s; background: #fff;
}
.search-input:focus { border-color: #0f3460; box-shadow: 0 0 0 3px rgba(15,52,96,.08); }
.price-range { display: flex; align-items: center; gap: 4px; }
.price-range input {
  width: 72px; padding: 10px 8px; border: 2px solid #eee;
  border-radius: 10px; font-size: 13px; outline: none; background: #fff;
}
.price-range input:focus { border-color: #0f3460; }
.price-range span { color: #bbb; font-size: 12px; }
.btn-add {
  background: linear-gradient(135deg, #0f3460, #1a4a7a);
  color: #fff; border: none; padding: 10px 18px; border-radius: 10px;
  font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap;
  box-shadow: 0 4px 12px rgba(15,52,96,.25);
  transition: all .2s;
}
.btn-add:active { transform: scale(.95); }

/* ===== 手机卡片列表 ===== */
.phone-grid { display: none; }
.phone-card {
  background: #fff; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,.06);
  padding: 14px; display: flex; gap: 14px; align-items: center;
  margin-bottom: 10px; transition: all .2s; position: relative;
  animation: cardIn .3s ease;
}
@keyframes cardIn { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.phone-card:active { transform: scale(.98); }
.phone-card .card-img {
  width: 60px; height: 60px; border-radius: 12px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; font-weight: 700; color: #fff;
  box-shadow: 0 2px 8px rgba(0,0,0,.1);
}
.phone-card .card-body { flex: 1; min-width: 0; }
.phone-card .card-body .card-model { font-size: 16px; font-weight: 700; color: #1a1a2e; margin-bottom: 2px; }
.phone-card .card-body .card-meta { font-size: 12px; color: #999; display: flex; gap: 6px; flex-wrap: wrap; }
.phone-card .card-body .card-meta span { display: inline-flex; align-items: center; gap: 2px; }
.phone-card .card-right { text-align: right; flex-shrink: 0; }
.phone-card .card-right .card-price { font-size: 18px; font-weight: 800; color: #e53935; }
.phone-card .card-right .card-stock { font-size: 12px; margin-top: 2px; }

/* ===== 桌面表格 ===== */
.table-wrap { background: #fff; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.06); overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
thead th {
  background: #f7f8fa; text-align: left; padding: 12px 12px;
  font-size: 12px; color: #888; font-weight: 600;
  border-bottom: 2px solid #eee; white-space: nowrap;
}
tbody td { padding: 12px 12px; border-bottom: 1px solid #f0f0f0; font-size: 13px; vertical-align: middle; }
tbody tr:hover { background: #f8faff; }
tbody tr:active { background: #eef2fa; }
.phone-img {
  width: 48px; height: 48px; border-radius: 8px; object-fit: cover;
  display: block; border: 1px solid #eee; background: #fafafa;
}
.phone-img-placeholder {
  width: 48px; height: 48px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 700; color: #fff;
}

.badge { display: inline-block; padding: 2px 10px; border-radius: 8px; font-size: 11px; font-weight: 600; }
.badge-apple { background: #fff0f0; color: #b00; }
.badge-samsung { background: #e8f4fd; color: #0a6fc9; }
.badge-xiaomi { background: #fff3e0; color: #d47700; }
.badge-huawei { background: #e8f5e9; color: #2e7d32; }
.badge-oppo { background: #fce4ec; color: #c2185b; }
.badge-vivo { background: #e0f2f1; color: #00695c; }
.badge-荣耀 { background: #f3e5f5; color: #7b1fa2; }
.badge-魅族 { background: #e0f7fa; color: #00838f; }
.badge-其他 { background: #f5f5f5; color: #616161; }

.perf-badge { display: inline-block; padding: 2px 10px; border-radius: 8px; font-size: 11px; font-weight: 600; }
.perf-旗舰 { background: #fff8e1; color: #f57f17; }
.perf-次旗舰 { background: #e8eaf6; color: #283593; }
.perf-中端 { background: #e8f5e9; color: #2e7d32; }
.perf-入门 { background: #fce4ec; color: #c62828; }

.stock-low { color: #e53935; font-weight: 600; }
.stock-out { color: #bbb; }

.btn {
  padding: 6px 12px; border: none; border-radius: 8px;
  cursor: pointer; font-size: 11px; font-weight: 600;
  transition: all .2s; white-space: nowrap;
}
.btn:active { transform: scale(.93); }
.btn-edit { background: #e3f2fd; color: #1565c0; }
.btn-restock { background: #e8f5e9; color: #2e7d32; }
.btn-delete { background: #fce4ec; color: #c62828; }
.btn-specs { background: #f3e5f5; color: #7b1fa2; }
.btn-save { background: #0f3460; color: #fff; }
.btn-cancel { background: #f0f0f0; color: #666; }
td .actions { display: flex; gap: 4px; flex-wrap: wrap; }

/* ===== 详情页 ===== */
.detail-page { display: none; padding: 12px; }
.detail-page.active { display: block; animation: fadeUp .3s ease; }
.detail-header {
  background: #fff; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,.06);
  padding: 20px; margin-bottom: 12px; display: flex; gap: 16px; align-items: flex-start;
}
.detail-header .placeholder {
  width: 100px; height: 100px; border-radius: 16px; display: flex; align-items: center;
  justify-content: center; font-size: 48px; color: #fff; font-weight: 700; flex-shrink: 0;
}
.detail-header img {
  width: 100px; height: 100px; object-fit: cover; border-radius: 16px; flex-shrink: 0;
}
.detail-info { flex: 1; }
.detail-info h2 { font-size: 20px; margin-bottom: 4px; }
.detail-info .tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
.detail-info .tags span { padding: 3px 12px; border-radius: 12px; font-size: 11px; font-weight: 600; }
.detail-meta { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin: 10px 0; }
.detail-meta .meta-item { background: #f8f9fa; border-radius: 10px; padding: 10px; text-align: center; }
.detail-meta .meta-item .val { font-size: 18px; font-weight: 700; color: #0f3460; }
.detail-meta .meta-item .lbl { font-size: 11px; color: #999; margin-top: 2px; }
.detail-actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
.detail-actions .btn { padding: 8px 16px; font-size: 12px; flex: 1; text-align: center; min-width: 0; }
.detail-body { background: #fff; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,.06); padding: 18px; }
.detail-body h3 { font-size: 15px; margin-bottom: 10px; color: #0f3460; border-left: 3px solid #0f3460; padding-left: 10px; }
.detail-specs { display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px 12px; }
.detail-specs .s-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #f5f5f5; font-size: 13px; }
.detail-specs .s-item .s-key { color: #999; font-size: 12px; }
.detail-specs .s-item .s-val { font-weight: 500; text-align: right; font-size: 13px; }

.back-btn {
  display: inline-flex; align-items: center; gap: 4px; padding: 8px 16px;
  border: none; background: #fff; border-radius: 10px; font-size: 13px;
  font-weight: 600; color: #666; cursor: pointer; margin-bottom: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,.06);
}

/* ===== 模态框 ===== */
.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5);
  z-index: 1000; justify-content: center; align-items: flex-end;
}
.modal-overlay.show { display: flex; }
.modal {
  background: #fff; border-radius: 20px 20px 0 0; padding: 24px 20px 30px;
  width: 100%; max-width: 520px; max-height: 85vh; overflow-y: auto;
  box-shadow: 0 -10px 40px rgba(0,0,0,.15);
  animation: slideUp .35s ease;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal h2 { font-size: 18px; margin-bottom: 16px; color: #1a1a2e; }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 12px; font-weight: 600; color: #888; margin-bottom: 4px; }
.form-group input, .form-group select {
  width: 100%; padding: 12px 14px; border: 2px solid #eee;
  border-radius: 10px; font-size: 14px; outline: none; transition: all .2s;
  background: #fafafa;
}
.form-group input:focus, .form-group select:focus { border-color: #0f3460; background: #fff; }
.form-row { display: flex; gap: 10px; }
.form-row .form-group { flex: 1; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
.modal-actions .btn { padding: 10px 24px; font-size: 14px; border-radius: 10px; }

/* ===== 配置弹窗 ===== */
.specs-grid { display: grid; gap: 8px; margin-top: 12px; }
.specs-item {
  display: flex; padding: 8px 12px; background: #f8f9fa;
  border-radius: 8px; align-items: flex-start;
}
.specs-item .specs-key { font-size: 12px; font-weight: 600; color: #999; min-width: 60px; flex-shrink: 0; }
.specs-item .specs-val { font-size: 13px; color: #333; line-height: 1.4; }
.specs-header { display: flex; align-items: center; gap: 12px; padding-bottom: 12px; border-bottom: 1px solid #eee; margin-bottom: 4px; }
.specs-header img { width: 56px; height: 56px; border-radius: 10px; object-fit: cover; }
.specs-header .specs-title h3 { font-size: 16px; color: #1a1a2e; }
.specs-header .specs-title span { font-size: 12px; color: #999; }

.empty { text-align: center; padding: 40px 20px; color: #bbb; font-size: 14px; }

/* ===== Toast ===== */
.toast {
  position: fixed; top: 60px; left: 50%; transform: translateX(-50%); z-index: 2000;
  padding: 12px 24px; border-radius: 10px; color: #fff;
  font-size: 14px; font-weight: 600; box-shadow: 0 4px 20px rgba(0,0,0,.15);
  animation: toastIn .3s ease; pointer-events: none; text-align: center;
}
.toast-success { background: #2e7d32; }
.toast-error { background: #c62828; }
.toast-info { background: #1565c0; }
@keyframes toastIn { from { transform: translateX(-50%) translateY(-20px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }

/* ===== 桌面端适配 ===== */
@media (min-width: 769px) {
  .phone-grid { display: none !important; }
  .table-wrap { display: block; }
  .header { padding: 20px 40px; }
  .header h1 { font-size: 28px; }
  .header-user span { display: inline; }
  .container { padding: 24px; }
  .stats { grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .stat-card { padding: 18px 20px; }
  .stat-card .num { font-size: 26px; }
  .brand-nav { gap: 8px; margin-bottom: 12px; }
  .brand-tab { padding: 10px 24px; font-size: 14px; }
  .detail-header { padding: 28px; gap: 28px; }
  .detail-header .placeholder { width: 160px; height: 160px; font-size: 64px; }
  .detail-header img { width: 160px; height: 160px; }
  .detail-info h2 { font-size: 26px; }
  .detail-meta { grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .detail-specs { grid-template-columns: repeat(2, 1fr); }
  .modal-overlay { align-items: center; }
  .modal { border-radius: 20px; width: 90%; animation: modalIn .25s ease; }
  @keyframes modalIn { from { transform: scale(.92); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .search-input { width: 220px; flex: none; }
  .toolbar { flex-wrap: wrap; }
  .detail-actions .btn { flex: none; }
}

/* ===== 手机端 ===== */
@media (max-width: 768px) {
  .phone-grid { display: block; }
  .table-wrap { display: none; }
  .header h1 { font-size: 18px; }
  .header-user button { padding: 5px 10px; font-size: 11px; }
  .stats { grid-template-columns: repeat(2, 1fr); gap: 6px; }
  .stat-card { padding: 10px 8px; }
  .stat-card .num { font-size: 17px; }
  .stat-card .label { font-size: 10px; }
  .brand-nav { gap: 4px; }
  .brand-tab { padding: 6px 14px; font-size: 12px; }
  .toolbar { flex-wrap: wrap; }
  .search-input { width: 100%; }
  .price-range { width: 100%; justify-content: space-between; }
  .price-range input { width: 80px; }
  .btn-add { width: 100%; text-align: center; }
  .detail-header { flex-direction: column; align-items: center; text-align: center; }
  .detail-header .placeholder { width: 80px; height: 80px; font-size: 36px; }
  .detail-header img { width: 80px; height: 80px; }
  .detail-meta { grid-template-columns: repeat(2, 1fr); }
  .detail-actions { flex-wrap: wrap; }
  .detail-actions .btn { padding: 10px 12px; font-size: 12px; flex: 1; min-width: 60px; }
  .detail-specs { grid-template-columns: 1fr; }
  .modal { padding: 20px 16px 24px; }
  .form-row { flex-direction: column; gap: 0; }
}
</style>
</head>
<body>

<div class="header">
  <h1>手机售卖管理系统</h1>
  <p>品牌分类 · 价格管理 · 库存补货 · 配置详情</p>
  <div class="header-user" id="headerUser" style="display:none">
    <span id="currentUserLabel"></span>
    <button onclick="showUsers()">切换用户</button>
    <button onclick="showPasswordModal()">修改密码</button>
    <button onclick="logout()">退出</button>
  </div>
</div>

<div class="auth-page" id="loginPage">
  <div class="auth-box">
    <h2>登录</h2>
    <div class="error" id="loginError"></div>
    <div class="form-group"><label>用户名</label><input id="loginUsername" placeholder="请输入用户名" autocomplete="off"></div>
    <div class="form-group"><label>密码</label><input id="loginPassword" type="password" placeholder="请输入密码" autocomplete="off"></div>
    <button class="btn btn-primary" onclick="login()">登 录</button>
    <div class="auth-link">还没有账号？<a onclick="showRegister()">立即注册</a></div>
  </div>
</div>

<div class="auth-page" id="registerPage" style="display:none">
  <div class="auth-box">
    <h2>注册</h2>
    <div class="error" id="registerError"></div>
    <div class="form-group"><label>用户名</label><input id="regUsername" placeholder="至少3位字符" autocomplete="off"></div>
    <div class="form-group"><label>密码</label><input id="regPassword" type="password" placeholder="至少3位字符" autocomplete="off"></div>
    <button class="btn btn-primary" onclick="register()">注 册</button>
    <div class="auth-link">已有账号？<a onclick="showLogin()">返回登录</a></div>
  </div>
</div>

<div class="main-app" id="mainApp">
<div class="container">
  <div class="stats">
    <div class="stat-card"><div class="num" id="totalPhones">0</div><div class="label">手机型号数</div></div>
    <div class="stat-card"><div class="num" id="totalStock">0</div><div class="label">库存总量</div></div>
    <div class="stat-card"><div class="num" id="totalValue">¥0</div><div class="label">库存总价值</div></div>
    <div class="stat-card"><div class="num" id="lowStockCount">0</div><div class="label">低库存商品</div></div>
  </div>

  <nav class="brand-nav" id="brandNav">
    <button class="brand-tab active" data-brand="all" onclick="switchBrand('all')">全部</button>
  </nav>

  <div class="toolbar">
    <input class="search-input" id="searchInput" placeholder="搜索型号..." oninput="loadPhones()">
    <div class="price-range">
      <input type="number" id="minPrice" min="0" placeholder="¥最低" onchange="loadPhones()">
      <span>—</span>

<div class="modal-overlay" id="passwordOverlay">
  <div class="modal" style="max-width:400px">
    <h2>修改密码</h2>
    <div class="error" id="pwError" style="color:#e53935;font-size:13px;text-align:center;margin-bottom:10px;display:none"></div>
    <div class="form-group"><label>原密码</label><input id="pwOld" type="password" style="width:100%;padding:10px 14px;border:2px solid #e0e0e0;border-radius:8px;font-size:15px;outline:none"></div>
    <div class="form-group" style="margin-top:12px"><label>新密码</label><input id="pwNew" type="password" style="width:100%;padding:10px 14px;border:2px solid #e0e0e0;border-radius:8px;font-size:15px;outline:none"></div>
    <div class="modal-actions" style="margin-top:20px">
      <button class="btn btn-cancel" onclick="closeModalById('passwordOverlay')">取消</button>
      <button class="btn btn-save" onclick="changePassword()">确认修改</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="usersOverlay">
  <div class="modal" style="max-width:400px">
    <h2>切换用户</h2>
    <div id="usersList" style="margin:16px 0"></div>
    <div style="border-top:1px solid #eee;padding-top:14px;margin-top:4px">
      <div style="margin-bottom:8px">
        <input id="newUserName" placeholder="新用户名" style="width:100%;padding:8px 12px;border:2px solid #e0e0e0;border-radius:8px;font-size:14px;outline:none" autocomplete="off">
      </div>
      <div style="display:flex;gap:8px">
        <input id="newUserPw" type="password" placeholder="密码" style="flex:1;padding:8px 12px;border:2px solid #e0e0e0;border-radius:8px;font-size:14px;outline:none" autocomplete="off">
        <button class="btn btn-add" onclick="addUser()" style="padding:8px 20px;white-space:nowrap">添加</button>
      </div>
      <div id="addUserMsg" style="font-size:13px;color:#e53935;margin-top:6px;display:none"></div>
    </div>
    <div class="modal-actions" style="margin-top:14px">
      <button class="btn btn-cancel" onclick="closeModalById('usersOverlay')">关闭</button>
    </div>
  </div>
</div>

<div class="alert-overlay" id="alertOverlay"><div class="alert-box"><p id="alertMsg"></p><button onclick="closeAlert()">确定</button></div></div>


<script>

const API_BASE = localStorage.getItem('apiBase') || '';
let currentBrand = 'all';
let editingId = null;
let currentUser = null;

function getToken() { return localStorage.getItem('token'); }
function setToken(t) { if (t) localStorage.setItem('token',t); else localStorage.removeItem('token'); }

const BRAND_SERIES = {
  Apple:'iPhone',Samsung:'Galaxy',Xiaomi:'Xiaomi',Huawei:'Huawei',
  OPPO:'OPPO',vivo:'vivo',
  '魅族':'魅族',
  '荣耀':'荣耀',
  OnePlus:'OnePlus',Google:'Pixel',
  '其他':'其他'
};
const BRAND_COLORS = {
  Apple:'#b00',Samsung:'#0a6fc9',Xiaomi:'#d47700',Huawei:'#2e7d32',
  OPPO:'#c2185b',vivo:'#00695c',
  '魅族':'#00838f',
  '荣耀':'#7b1fa2',
  OnePlus:'#eb0029',Google:'#4285f4',
  '其他':'#616161'
};

async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  const token = getToken();
  if (token) opts.headers['Authorization'] = 'Bearer ' + token;
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API_BASE + path, opts);
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || '请求失败');
  return data;
}

function showLogin() {
  document.getElementById('loginPage').style.display = '';
  document.getElementById('registerPage').style.display = 'none';
}
function showRegister() {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('registerPage').style.display = '';
}

async function login() {
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value.trim();
  if (!username || !password) { showAlert('请输入用户名和密码'); return; }
  try {
    const data = await api('POST', '/api/auth/login', { username, password });
    setToken(data.token);
    currentUser = data.user;
    enterApp();
  } catch (e) { showAlert(e.message); }
}

async function register() {
  const username = document.getElementById('regUsername').value.trim();
  const password = document.getElementById('regPassword').value.trim();
  if (!username || !password) { showAlert('请填写用户名和密码'); return; }
  if (username.length < 3) { showAlert('用户名至少3位字符'); return; }
  if (password.length < 3) { showAlert('密码至少3位字符'); return; }
  try {
    const data = await api('POST', '/api/auth/register', { username, password });
    setToken(data.token);
    currentUser = data.user;
    showAlert('注册成功！欢迎 ' + username);
    enterApp();
  } catch (e) { showAlert(e.message); }
}

function logout() {
  setToken(null);
  currentUser = null;
  document.querySelectorAll('.auth-page, #mainApp, .header-user').forEach(el => el.style.display = 'none');
  document.getElementById('loginPage').style.display = '';
  document.getElementById('loginUsername').value = '';
  document.getElementById('loginPassword').value = '';
}

function enterApp() {
  document.querySelectorAll('.auth-page').forEach(el => el.style.display = 'none');
  document.getElementById('mainApp').style.display = 'block';
  document.getElementById('headerUser').style.display = '';
  document.getElementById('currentUserLabel').textContent = currentUser ? currentUser.username : '';
  loadBrands();
  loadPhones();
}

function closeModalById(id) {
  document.getElementById(id).classList.remove('show');
}

async function addUser() {
  const username = document.getElementById('newUserName').value.trim();
  const password = document.getElementById('newUserPw').value.trim();
  const msgEl = document.getElementById('addUserMsg');
  if (!username || !password) { msgEl.textContent = '请填写用户名和密码'; msgEl.style.display = ''; return; }
  try {
    await api('POST', '/api/users', { username, password });
    document.getElementById('newUserName').value = '';
    document.getElementById('newUserPw').value = '';
    msgEl.style.display = 'none';
    showToast('已添加用户 ' + username, 'success');
    showUsers();
  } catch (e) { msgEl.textContent = e.message; msgEl.style.display = ''; }
}

async function showUsers() {
  try {
    const users = await api('GET', '/api/users');
    const list = document.getElementById('usersList');
    list.innerHTML = users.map(function(u) {
      var isCur = u.id === currentUser?.id;
      return '<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f0f0f0">' +
        '<span style="font-weight:' + (isCur ? '700' : '400') + ';color:' + (isCur ? '#0f3460' : '#333') + '">' + u.username + (isCur ? ' (当前)' : '') + '</span>' +
        (isCur ? '' : '<button class="btn btn-edit" style="padding:4px 14px;font-size:13px" onclick="switchToUser(' + u.id + ')">切换</button>') +
      '</div>';
    }).join('');
    document.getElementById('usersOverlay').classList.add('show');
  } catch (e) { showToast('获取用户列表失败', 'error'); }
}

async function switchToUser(userId) {
  showAlert('请使用该用户账号重新登录');
  logout();
}

function showPasswordModal() {
  document.getElementById('pwOld').value = '';
  document.getElementById('pwNew').value = '';
  document.getElementById('passwordOverlay').classList.add('show');
}

async function changePassword() {
  const oldPassword = document.getElementById('pwOld').value.trim();
  const newPassword = document.getElementById('pwNew').value.trim();
  if (!oldPassword || !newPassword) { showAlert('请填写完整'); return; }
  try {
    await api('PUT', '/api/auth/password', { oldPassword, newPassword });
    document.getElementById('passwordOverlay').classList.remove('show');
    showToast('密码已修改，请重新登录', 'info');
    logout();
  } catch (e) { showAlert(e.message); }
}

async function loadBrands() {
  try {
    const phones = await api('GET', '/api/phones');
    var brandSet = {};
    phones.forEach(function(p) { brandSet[p.brand] = true; });
    var brands = Object.keys(brandSet).sort(function(a,b) {
      if (a === '魅族') return -1; if (b === '魅族') return 1;
      return a.localeCompare(b, 'zh');
    });
    var nav = document.getElementById('brandNav');
    nav.innerHTML = '<button class="brand-tab active" data-brand="all" onclick="switchBrand(\'all\')">全部</button>';
    brands.forEach(function(b) {
      var btn = document.createElement('button');
      btn.className = 'brand-tab';
      btn.dataset.brand = b;
      btn.textContent = b;
      btn.onclick = function() { switchBrand(b); };
      nav.appendChild(btn);
    });
  } catch (e) { showToast('加载品牌失败', 'error'); }
}

function switchBrand(brand) {
  currentBrand = brand;
  document.querySelectorAll('#brandNav .brand-tab').forEach(function(el) {
    el.classList.toggle('active', el.dataset.brand === brand);
  });
  loadPhones();
}

async function loadPhones() {
  var search = document.getElementById('searchInput').value.trim().toLowerCase();
  var minPrice = parseFloat(document.getElementById('minPrice').value) || 0;
  var maxPrice = parseFloat(document.getElementById('maxPrice').value) || 0;
  var params = new URLSearchParams();
  if (currentBrand !== 'all') params.set('brand', currentBrand);
  if (search) params.set('search', search);
  if (minPrice > 0) params.set('minPrice', minPrice);
  if (maxPrice > 0) params.set('maxPrice', maxPrice);
  try {
    var phones = await api('GET', '/api/phones?' + params.toString());
    renderTable(phones);
    loadStats();
  } catch (e) { showToast('加载失败', 'error'); }
}

function renderTable(phones) {
  var tbody = document.getElementById('tableBody');
  var grid = document.getElementById('phoneGrid');
  if (phones.length === 0) {
    tbody.innerHTML = '<tr><td colspan="9"><div class="empty"><p>暂无数据</p></div></td></tr>';
    grid.innerHTML = '<div class="empty">暂无数据</div>';
    return;
  }
  function color(p) { return BRAND_COLORS[p.brand] || '#616161'; }
  function initial(p) { return p.brand.charAt(0); }
  function badgeClass(p) { return 'badge badge-' + p.brand.toLowerCase().replace(/\s+/g, ''); }
  function perfClass(p) { return 'perf-badge perf-' + p.performance; }
  function stockClass(p) { return p.stock === 0 ? 'stock-out' : (p.stock <= 5 ? 'stock-low' : ''); }
  function statusText(p) { return p.stock === 0 ? '缺货' : (p.stock <= 5 ? '紧急补货' : '正常'); }
  function statusColor(p) { return p.stock === 0 ? '#bbb' : (p.stock <= 5 ? '#e53935' : '#43a047'); }

  tbody.innerHTML = phones.map(function(p) {
    var c = color(p), inits = initial(p);
    var img = p.image
      ? '<img class="phone-img" src="' + p.image + '" alt="' + p.model + '" onerror="this.onerror=null;this.outerHTML=\'<div class=\'phone-img-placeholder\' style=\'background:' + c + '\'>' + inits + '</div>\'">'
      : '<div class="phone-img-placeholder" style="background:' + c + '">' + inits + '</div>';
    var seriesShow = p.series ? '<span style="color:#555;font-size:12px">' + p.series + '</span>' : '<span style="color:#ccc">-</span>';
    return '<tr><td>' + img + '</td><td><strong>' + p.model + '</strong></td><td><span class="' + badgeClass(p) + '">' + p.brand + '</span></td><td>' + seriesShow + '</td><td><span class="' + perfClass(p) + '">' + p.performance + '</span></td><td><strong>¥' + p.price.toLocaleString() + '</strong></td><td class="' + stockClass(p) + '">' + p.stock + '</td><td><span style="color:' + statusColor(p) + ';font-weight:600">' + statusText(p) + '</span></td><td><div class="actions"><button class="btn btn-specs" onclick="showDetail(' + p.id + ')">详情</button></div></td></tr>';
  }).join('');

  grid.innerHTML = phones.map(function(p) {
    var c = color(p), inits = initial(p);
    var perfC = p.performance === '旗舰' ? '#f57f17' : p.performance === '次旗舰' ? '#283593' : p.performance === '中端' ? '#2e7d32' : '#c62828';
    var cardImg = p.image
      ? '<div class="card-img" style="background:' + c + ';overflow:hidden"><img src="' + p.image + '" style="width:100%;height:100%;object-fit:cover" alt="" onerror="this.outerHTML=\'' + inits + '\'"></div>'
      : '<div class="card-img" style="background:' + c + '">' + inits + '</div>';
    var statusC = statusColor(p);
    return '<div class="phone-card" onclick="showDetail(' + p.id + ')">' + cardImg +
      '<div class="card-body"><div class="card-model">' + p.model + '</div><div class="card-meta"><span class="' + badgeClass(p) + '">' + p.brand + '</span><span style="color:' + perfC + ';font-weight:600">' + p.performance + '</span>' + (p.series ? '<span style="color:#999">' + p.series + '</span>' : '') + '</div></div>' +
      '<div class="card-right"><div class="card-price">¥' + p.price.toLocaleString() + '</div><div class="card-stock" style="color:' + statusC + ';font-weight:' + (p.stock <= 5 ? '700' : '400') + '">库存: ' + p.stock + '</div></div></div>';
  }).join('');
}

function autoFillSeries() {
  var brand = document.getElementById('formBrand').value;
  document.getElementById('formSeries').value = BRAND_SERIES[brand] || brand;
}

async function showSpecs(id) {
  try {
    var p = await api('GET', '/api/phones/' + id);
    if (!p) return;
    var specs;
    try { specs = typeof p.specs === 'string' ? JSON.parse(p.specs) : p.specs; } catch (e) { specs = {}; }
    var color = BRAND_COLORS[p.brand] || '#616161';
    var init = p.brand.charAt(0);
    var imgHtml = p.image
      ? '<img src="' + p.image + '" alt="' + p.model + '" style="width:80px;height:80px;border-radius:10px;object-fit:cover" onerror="this.onerror=null;this.outerHTML=\'<div style=\'width:80px;height:80px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:' + color + ';color:#fff;font-size:28px;font-weight:700\'>' + init + '</div>\'">'
      : '<div style="width:80px;height:80px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:' + color + ';color:#fff;font-size:28px;font-weight:700">' + init + '</div>';
    var specsHtml = Object.entries(specs).map(function(e) { return '<div class="specs-item"><span class="specs-key">' + e[0] + '</span><span class="specs-val">' + e[1] + '</span></div>'; }).join('') || '<div class="empty"><p>暂无配置信息</p></div>';
    document.getElementById('specsContent').innerHTML = '<div class="specs-header">' + imgHtml + '<div class="specs-title"><h3>' + p.model + '</h3><span>' + p.brand + (p.series ? ' · ' + p.series : '') + ' · ' + p.performance + ' · ¥' + p.price.toLocaleString() + '</span></div></div><div class="specs-grid">' + specsHtml + '</div>';
    document.getElementById('specsOverlay').classList.add('show');
  } catch (e) { showToast('加载失败', 'error'); }
}

function closeSpecs() {
  document.getElementById('specsOverlay').classList.remove('show');
}

async function showDetail(id) {
  try {
    var p = await api('GET', '/api/phones/' + id);
    if (!p) return;
    renderDetail(p);
    document.getElementById('detailPage').classList.add('active');
    var stats = document.querySelector('.stats');
    if (stats) stats.style.display = 'none';
  } catch (e) { showToast('加载失败', 'error'); }
}

function backToList() {
  document.getElementById('detailPage').classList.remove('active');
  document.getElementById('detailContent').innerHTML = '';
  var stats = document.querySelector('.stats');
  if (stats) stats.style.display = '';
}

function renderDetail(p) {
  var color = BRAND_COLORS[p.brand] || '#616161';
  var init = p.brand.charAt(0);
  var perfClass = 'perf-badge perf-' + p.performance;
  var statusText = p.stock === 0 ? '缺货' : (p.stock <= 5 ? '紧急补货' : '正常');
  var statusColor = p.stock === 0 ? '#999' : (p.stock <= 5 ? '#e53935' : '#43a047');
  var imgHtml = p.image
    ? '<img src="' + p.image + '" alt="' + p.model + '" style="width:180px;height:180px;object-fit:cover;border-radius:12px;flex-shrink:0;border:1px solid #eee;background:#fafafa;box-shadow:0 2px 8px rgba(0,0,0,.08)" onerror="this.onerror=null;this.outerHTML=\'<div class=\'placeholder\' style=\'background:' + color + '\'>' + init + '</div>\'">'
    : '<div class="placeholder" style="background:' + color + '">' + init + '</div>';
  var specs;
  try { specs = typeof p.specs === 'string' ? JSON.parse(p.specs) : p.specs; } catch (e) { specs = {}; }
  var specsHtml = Object.entries(specs).map(function(e) { return '<div class="s-item"><span class="s-key">' + e[0] + '</span><span class="s-val">' + e[1] + '</span></div>'; }).join('') || '<p style="color:#999">暂无配置信息</p>';

  document.getElementById('detailContent').innerHTML =
    '<div class="detail-header">' + imgHtml +
      '<div class="detail-info"><h2>' + p.model + '</h2>' +
        '<div class="tags">' +
          '<span class="' + perfClass + '">' + p.performance + '</span>' +
          '<span style="background:#e3f2fd;color:#1565c0">' + p.brand + '</span>' +
          (p.series ? '<span style="background:#f3e5f5;color:#7b1fa2">' + p.series + '</span>' : '') +
          '<span style="color:' + statusColor + ';background:' + statusColor + '15;font-weight:600">' + statusText + '</span>' +
        '</div>' +
        '<div class="detail-meta">' +
          '<div class="meta-item"><div class="val">¥' + p.price.toLocaleString() + '</div><div class="lbl">价格</div></div>' +
          '<div class="meta-item"><div class="val">' + p.stock + '</div><div class="lbl">库存</div></div>' +
          '<div class="meta-item"><div class="val">' + p.performance + '</div><div class="lbl">性能定位</div></div>' +
          (p.series ? '<div class="meta-item"><div class="val" style="font-size:16px">' + p.series + '</div><div class="lbl">系列</div></div>' : '') +
        '</div>' +
        '<div class="detail-actions">' +
          '<button class="btn btn-edit" onclick="openModal(\'edit\',' + p.id + '); document.getElementById(\'detailPage\').dataset.returnId=' + p.id + '">改价</button>' +
          '<button class="btn btn-restock" onclick="openModal(\'restock\',' + p.id + '); document.getElementById(\'detailPage\').dataset.returnId=' + p.id + '">补货</button>' +
          '<button class="btn btn-edit" onclick="openModal(\'editAll\',' + p.id + '); document.getElementById(\'detailPage\').dataset.returnId=' + p.id + '">编辑</button>' +
          '<button class="btn btn-delete" onclick="deletePhoneFromDetail(' + p.id + ')">删除</button>' +
        '</div></div></div>' +
    '<div class="detail-body"><h3>详细配置</h3><div class="detail-specs">' + specsHtml + '</div></div>';
}

async function deletePhoneFromDetail(id) {
  if (!confirm('确定要删除该手机吗？')) return;
  try {
    await api('DELETE', '/api/phones/' + id);
    showToast('已删除', 'info');
    backToList();
    loadPhones();
  } catch (e) { showToast('删除失败: ' + e.message, 'error'); }
}

async function loadStats() {
  try {
    var s = await api('GET', '/api/stats');
    document.getElementById('totalPhones').textContent = s.totalPhones;
    document.getElementById('totalStock').textContent = s.totalStock;
    document.getElementById('totalValue').textContent = '¥' + s.totalValue.toLocaleString();
    document.getElementById('lowStockCount').textContent = s.lowStock;
  } catch (e) {}
}

function openModal(action, id) {
  var overlay = document.getElementById('modalOverlay');
  var title = document.getElementById('modalTitle');
  var saveBtn = document.getElementById('modalSaveBtn');
  var elModel = document.getElementById('formModel');
  var elBrand = document.getElementById('formBrand');
  var elPrice = document.getElementById('formPrice');
  var elStock = document.getElementById('formStock');
  var elImage = document.getElementById('formImage');
  var elPerf = document.getElementById('formPerformance');
  var elSeries = document.getElementById('formSeries');
  var fields = [elModel, elBrand, elSeries, elPrice, elStock, elImage, elPerf];
  fields.forEach(function(e) { e.disabled = false; e.style.display = ''; });
  document.querySelectorAll('#modalOverlay .form-group, #modalOverlay .form-row').forEach(function(e) { e.style.display = ''; });
  if (action === 'add') {
    title.textContent = '添加新手机';
    elModel.value = ''; elBrand.value = 'Apple';
    elPrice.value = ''; elStock.value = ''; elImage.value = ''; elPerf.value = '中端';
    autoFillSeries();
    editingId = null; saveBtn.textContent = '添加'; saveBtn.dataset.action = 'add';
    overlay.classList.add('show'); return;
  }
  api('GET', '/api/phones/' + id).then(function(p) {
    if (!p) return;
    elModel.value = p.model; elBrand.value = p.brand;
    elSeries.value = p.series || '';
    elPrice.value = p.price; elStock.value = p.stock;
    elImage.value = p.image || ''; elPerf.value = p.performance || '中端';
    if (action === 'edit') {
      title.textContent = '修改价格 - ' + p.model;
      elModel.disabled = true; elBrand.disabled = true; elSeries.disabled = true;
      elImage.disabled = true; elPerf.disabled = true;
      elStock.style.display = 'none'; elStock.disabled = true;
      document.querySelectorAll('#modalOverlay .form-row')[1].style.display = 'none';
      editingId = id; saveBtn.textContent = '保存价格'; saveBtn.dataset.action = 'edit';
    } else if (action === 'editAll') {
      title.textContent = '编辑 - ' + p.model;
      elModel.disabled = true; elBrand.disabled = true; elSeries.disabled = true;
      editingId = id; saveBtn.textContent = '保存修改'; saveBtn.dataset.action = 'editAll';
    } else {
      title.textContent = '补货 - ' + p.model;
      elModel.disabled = true; elBrand.disabled = true; elSeries.disabled = true;
      elPrice.disabled = true; elImage.disabled = true; elPerf.disabled = true;
      elStock.value = '';
      editingId = id; saveBtn.textContent = '确认补货'; saveBtn.dataset.action = 'restock';
    }
    overlay.classList.add('show');
  });
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
  editingId = null;
}

async function savePhone() {
  var action = document.getElementById('modalSaveBtn').dataset.action;
  var model = document.getElementById('formModel').value.trim();
  var brand = document.getElementById('formBrand').value;
  var series = document.getElementById('formSeries').value.trim();
  var price = parseFloat(document.getElementById('formPrice').value);
  var stock = parseInt(document.getElementById('formStock').value) || 0;
  var image = document.getElementById('formImage').value.trim();
  var performance = document.getElementById('formPerformance').value;
  try {
    if (action === 'add') {
      if (!model) return showToast('请输入手机型号', 'error');
      if (!price || price <= 0) return showToast('请输入有效价格', 'error');
      await api('POST', '/api/phones', { brand: brand, model: model, series: series, price: price, stock: stock, image: image, performance: performance, specs: '{}' });
      showToast('已添加 ' + model, 'success');
    } else if (action === 'edit') {
      if (!price || price <= 0) return showToast('请输入有效价格', 'error');
      await api('PUT', '/api/phones/' + editingId, { price: price });
      showToast('价格已更新为 ¥' + price, 'success');
    } else if (action === 'editAll') {
      if (!price || price <= 0) return showToast('请输入有效价格', 'error');
      await api('PUT', '/api/phones/' + editingId, { price: price, stock: stock, image: image, performance: performance });
      showToast('已更新 ' + model, 'success');
    } else if (action === 'restock') {
      if (stock <= 0) return showToast('请输入有效的补货数量', 'error');
      var p = await api('GET', '/api/phones/' + editingId);
      await api('PUT', '/api/phones/' + editingId, { stock: p.stock + stock });
      showToast('补货成功，当前库存: ' + (p.stock + stock), 'success');
    }
    var dp = document.getElementById('detailPage');
    var detailId = dp.classList.contains('active') ? editingId : null;
    closeModal();
    loadPhones();
    if (detailId) {
      var pp = await api('GET', '/api/phones/' + detailId);
      if (pp) renderDetail(pp);
    }
  } catch (e) { showToast('操作失败: ' + e.message, 'error'); }
}

async function deletePhone(id) {
  if (!confirm('确定要删除该手机吗？')) return;
  try {
    await api('DELETE', '/api/phones/' + id);
    showToast('已删除', 'info');
    loadPhones();
  } catch (e) { showToast('删除失败: ' + e.message, 'error'); }
}

function showAlert(msg) {
  document.getElementById('alertMsg').textContent = msg;
  document.getElementById('alertOverlay').classList.add('show');
}
function closeAlert() {
  document.getElementById('alertOverlay').classList.remove('show');
}

function showToast(msg, type) {
  if (!type) type = 'info';
  var el = document.createElement('div');
  el.className = 'toast toast-' + type;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(function() { el.remove(); }, 3000);
}

(async function init() {
  try {
    var token = getToken();
    if (token) {
      var data = await api('GET', '/api/auth/user');
      currentUser = data.user;
      enterApp();
      return;
    }
  } catch (e) {}
  setToken(null);
  document.querySelectorAll('.auth-page').forEach(function(el) { el.style.display = 'none'; });
  document.getElementById('loginPage').style.display = 'flex';
})();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(function() {}).catch(function() {});
}

</script>
